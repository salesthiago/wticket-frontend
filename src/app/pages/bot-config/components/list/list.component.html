<app-header></app-header>
<app-sidebar />
<div class="p-4 sm:ml-64 pt-20">
  <div class="container mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Bots de WhatsApp</h1>
      <div class="flex gap-2">
        <p-button icon="pi pi-plus" label="Novo Bot" routerLink="/bot-config/create" severity="primary"></p-button>
      </div>
    </div>



    <p-table
     [value]="items"
     [paginator]="true"
     [rows]="20"
    [tableStyle]="{ 'min-width': '50rem' }"
    [rowsPerPageOptions]="[20, 30, 40]"
    >
  <ng-template #header>
        <tr>
            <th style="width:25%">Nome</th>
            <th style="width:25%">Status</th>
            <th style="width:25%">Dt. Criação</th>
            <th style="width:25%">Dt. Criação</th>
        </tr>
    </ng-template>
    <ng-template #body let-item>
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.enabled ? 'Ativo' : 'Desativado' }}</td>
            <td>{{ item.updatedAt | date: "dd/MM/yyyy" }}</td>
            <td>
              <p-button label="Editar" severity="info" (onClick)="editBot(item._id)" />
            </td>
        </tr>
    </ng-template>
  </p-table>
</div>
<p-confirmdialog />
