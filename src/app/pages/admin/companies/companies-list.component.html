<p-toast></p-toast>
<app-sidebar></app-sidebar>

<div class="sm:ml-64 p-6">
  <p-card>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-semibold">Empresas cadastradas</h2>
    </div>

    <div class="flex items-center gap-3 mb-4">
      <p-iconfield>
        <p-inputicon class="pi pi-search"></p-inputicon>
        <input pInputText type="text" placeholder="Buscar por nome..." [(ngModel)]="search" (keydown.enter)="load()" />
      </p-iconfield>
      <select [(ngModel)]="statusFilter" (change)="load()"
        class="border border-gray-300 rounded-md p-2 text-sm">
        @for (opt of statusOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
      <p-button icon="pi pi-refresh" severity="secondary" (click)="load()"></p-button>
    </div>

    <p-table [value]="companies" [loading]="loading" [paginator]="true" [rows]="10" stripedRows>
      <ng-template pTemplate="header">
        <tr>
          <th>Empresa</th>
          <th>Documento</th>
          <th>E-mail</th>
          <th>Módulos</th>
          <th>Status</th>
          <th style="width: 240px;">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-c>
        <tr>
          <td>{{ c.name }}</td>
          <td>{{ c.document || '-' }}</td>
          <td>{{ c.email }}</td>
          <td>
            <div class="flex flex-wrap gap-1">
              @for (m of c.modules; track m.code) {
                <p-tag [value]="m.code" severity="info"></p-tag>
              }
            </div>
          </td>
          <td><p-tag [value]="statusLabel(c.status)" [severity]="statusSeverity(c.status)"></p-tag></td>
          <td>
            <div class="flex gap-2">
              <p-button icon="pi pi-pencil" severity="secondary" size="small" (click)="edit(c)"></p-button>
              @if (c.status !== 'active') {
                <p-button icon="pi pi-check" label="Ativar" size="small" (click)="activate(c)"></p-button>
              }
              @if (c.status === 'active') {
                <p-button icon="pi pi-ban" severity="warn" label="Suspender" size="small" (click)="suspend(c)"></p-button>
              }
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="text-center text-gray-400 py-6">Nenhuma empresa encontrada</td></tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
