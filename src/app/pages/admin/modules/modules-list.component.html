<p-toast></p-toast>
<app-sidebar></app-sidebar>

<div class="sm:ml-64 p-6">
  <p-card>
    <h2 class="text-xl font-semibold mb-4">Catálogo de módulos</h2>

    <p-table [value]="modules" [loading]="loading" stripedRows>
      <ng-template pTemplate="header">
        <tr>
          <th>Código</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Requisitos</th>
          <th>Preço</th>
          <th>Status</th>
          <th style="width: 200px;">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-m>
        <tr>
          <td><code>{{ m.code }}</code></td>
          <td>{{ m.name }}</td>
          <td class="text-sm text-gray-600">{{ m.description }}</td>
          <td>
            <div class="flex flex-wrap gap-1">
              @for (r of (m.requires || []); track r) {
                <p-tag [value]="r" severity="warn"></p-tag>
              }
            </div>
          </td>
          <td>
            @if (editingId === m._id) {
              <input pInputText type="number" min="0" step="0.01" [(ngModel)]="draftPrice" class="w-24" />
            } @else {
              <span>R$ {{ (m.price ?? 0) | number:'1.2-2' }}</span>
            }
          </td>
          <td>
            <p-tag [value]="m.isActive ? 'ativo' : 'inativo'" [severity]="m.isActive ? 'success' : 'secondary'"></p-tag>
          </td>
          <td>
            <div class="flex gap-2">
              @if (editingId === m._id) {
                <p-button icon="pi pi-check" size="small" (click)="savePrice(m)"></p-button>
                <p-button icon="pi pi-times" severity="secondary" size="small" (click)="cancelEdit()"></p-button>
              } @else {
                <p-button icon="pi pi-pencil" severity="secondary" size="small" (click)="startEdit(m)"></p-button>
              }
              <p-button [icon]="m.isActive ? 'pi pi-eye-slash' : 'pi pi-eye'"
                [severity]="m.isActive ? 'warn' : 'success'" size="small" (click)="toggleActive(m)"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
