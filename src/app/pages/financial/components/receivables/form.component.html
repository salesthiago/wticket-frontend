<app-sidebar />
<div class="p-4 sm:ml-64 pt-4">
  <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome" class="mb-4 block" />

  @if (loading) {
    <div class="text-center text-gray-400 py-10">Carregando…</div>
  }

  @if (!loading) {
  <p-card>
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
      <div>
        <h2 class="text-xl font-semibold">{{ id ? 'Editar' : 'Novo' }} Lançamento</h2>
        @if (currentNumber) {
          <small class="text-gray-500 font-mono">Nº {{ currentNumber }}</small>
        }
      </div>
      @if (currentStatus) {
        <p-tag [value]="statusLabel(currentStatus)" [severity]="statusColor(currentStatus)" />
      }
    </div>

    @if (isReadOnly()) {
      <p-message severity="warn" styleClass="w-full mb-4"
        text="Este título não pode ser editado no status atual. Para alterá-lo, estorne ou reabra primeiro." />
    }

    @if (serviceOrderInfo) {
      <p-message severity="info" styleClass="w-full mb-4">
        Origem: faturamento da OS
        <a [routerLink]="['/service-orders/view', serviceOrderInfo._id]" class="underline ml-1">
          {{ serviceOrderInfo.orderNumber }}
        </a>
      </p-message>
    }

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="md:col-span-3">
        <label class="block text-sm mb-1">Descrição *</label>
        <input pInputText class="w-full" maxlength="500"
          [(ngModel)]="description"
          [disabled]="isReadOnly()"
          placeholder="Ex.: Manutenção mensal, Serviço técnico…" />
      </div>

      <div>
        <label class="block text-sm mb-1">Valor (R$) *</label>
        <p-inputNumber [(ngModel)]="amount"
          mode="currency" currency="BRL" locale="pt-BR" [min]="0"
          [disabled]="isReadOnly()" styleClass="w-full" />
      </div>

      <div>
        <label class="block text-sm mb-1">Vencimento *</label>
        <p-datePicker [(ngModel)]="dueDate"
          dateFormat="dd/mm/yy" [showButtonBar]="true"
          [disabled]="isReadOnly()" styleClass="w-full" />
      </div>

      <div>
        <label class="block text-sm mb-1">Forma de Pagamento *</label>
        <p-select [options]="optionMethods"
          [(ngModel)]="paymentMethod"
          optionLabel="label" optionValue="value"
          [disabled]="isReadOnly()" styleClass="w-full" />
      </div>

      <div class="md:col-span-3">
        <label class="block text-sm mb-1">Cliente (opcional)</label>
        <p-select [options]="optionCustomers"
          [(ngModel)]="customerId"
          [filter]="true" filterBy="label"
          optionLabel="label" optionValue="value"
          [showClear]="true"
          placeholder="Vincular um cliente cadastrado…"
          [disabled]="isReadOnly()" styleClass="w-full" />
      </div>

      <div class="md:col-span-3">
        <label class="block text-sm mb-1">Observações</label>
        <textarea pTextarea [(ngModel)]="notes" rows="3" maxlength="1000" class="w-full"
          [disabled]="isReadOnly()"
          placeholder="Anotações internas sobre este lançamento"></textarea>
      </div>
    </div>

    <div class="mt-6 flex justify-end gap-2">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="cancel()" />
      <p-button label="Salvar" icon="pi pi-save"
        [loading]="saving" [disabled]="isReadOnly()" (onClick)="save()" />
    </div>
  </p-card>
  }
</div>

<p-toast />
