<app-sidebar />
<div class="p-4 sm:ml-64 pt-4">
  <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome" class="mb-4 block" />
  <p-card class="flex align-items-center mb-4">
    <p-table
      [value]="items"
      [loading]="loading"
      class="my-4"
      [rows]="10"
      [paginator]="true"
      [globalFilterFields]="['name', 'email', 'phone', 'document']"
      [tableStyle]="{ 'min-width': '75rem' }"
      [rowHover]="true"
      dataKey="_id"
      currentPageReportTemplate=" {first} de {last} "
      [showCurrentPageReport]="true">

      <ng-template #caption>
        <div class="flex justify-between items-center flex-wrap gap-2">
          <p-button icon="pi pi-plus" label="Adicionar Cliente" (click)="add()"></p-button>
          <div class="flex items-center gap-2">
            <p-iconfield iconPosition="left">
              <p-inputicon>
                <i class="pi pi-search"></i>
              </p-inputicon>
              <input pInputText type="text" placeholder="Pesquisar por nome, e-mail ou telefone..."
                [(ngModel)]="search" (input)="onSearch()" class="w-72" />
            </p-iconfield>
            @if (search) {
              <p-button icon="pi pi-times" severity="secondary" (click)="clearSearch()"></p-button>
            }
          </div>
        </div>
      </ng-template>

      <ng-template #emptymessage>
        <tr>
          <td colspan="6">Nenhum cliente encontrado.</td>
        </tr>
      </ng-template>

      <ng-template #header>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>E-mail</th>
          <th>CPF / CNPJ</th>
          <th>Origem</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template #body let-customer>
        <tr>
          <td>{{ customer.name }}</td>
          <td>{{ customer.phone }}</td>
          <td>{{ customer.email || '—' }}</td>
          <td>{{ formatDocument(customer) }}</td>
          <td>
            <p-tag
              [value]="customer.source === 'lead' ? 'Lead' : 'Manual'"
              [severity]="customer.source === 'lead' ? 'info' : 'secondary'">
            </p-tag>
          </td>
          <td>
            <p-button icon="pi pi-pencil" (onClick)="edit(customer._id)" severity="primary" />
            <p-button icon="pi pi-trash" (onClick)="confirmDelete(customer._id)" severity="danger" class="px-2" />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<p-confirmDialog />
<p-toast />
