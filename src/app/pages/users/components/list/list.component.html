<app-header></app-header>
<app-sidebar />
<div class="p-4 sm:ml-64 pt-20">
  <p-card class="flex align-items-center mb-4">
    <p-table [value]="items" [loading]="loading" class="my-4" [rows]="10" [paginator]="true"
      [globalFilterFields]="['name', 'status']" [tableStyle]="{ 'min-width': '75rem' }" [rowHover]="true" dataKey="_id"
      currentPageReportTemplate=" {first} de {last} " [showCurrentPageReport]="true">
      <ng-template #caption>
        <div>
          <p-button icon="pi pi-plus" label="Adicionar" (click)="add()"></p-button>
        </div>
        <div class="flex">
          <p-iconfield iconPosition="left" class="ml-auto">
            <p-inputicon>
              <i class="pi pi-search"></i>
            </p-inputicon>
            <input pInputText type="text" placeholder="Pesquisar ..." [(ngModel)]="search"
              (change)="searchUser($event)" />
          </p-iconfield>
          @if(search) {

            <p-button icon="pi pi-times" severity="secondary"
            (click)="clearSearch()" class="ml-2"></p-button>
          }
        </div>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="5">Nenhum Usuário encontrado</td>
        </tr>
      </ng-template>
      <ng-template #header>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </ng-template>
      <ng-template #body let-user>
        <tr>
          <td>{{ user._id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.createdAt | date: 'dd/MM/yyyy H:mm' }}</td>
          <td>
            <p-button icon="pi pi-pencil" (onClick)="edit(user._id)" severity="primary" />
            <p-button icon="pi pi-trash" (onClick)="confirmDelete(user._id)" severity="danger" class="px-2" />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
<p-confirmDialog />
