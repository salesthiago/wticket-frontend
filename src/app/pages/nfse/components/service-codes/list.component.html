<app-sidebar />
<div class="p-4 sm:ml-64 pt-4">
  <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome" class="mb-4 block" />
  <p-card>
    <p-table
      [value]="items"
      [loading]="loading"
      [rows]="20"
      [paginator]="true"
      [tableStyle]="{ 'min-width': '70rem' }"
      [rowHover]="true"
      dataKey="_id"
      currentPageReportTemplate="{first} a {last} de {totalRecords}"
      [showCurrentPageReport]="true"
      [totalRecords]="total">

      <ng-template #caption>
        <div class="flex justify-between items-center flex-wrap gap-2">
          <p-button icon="pi pi-plus" label="Novo Código" (onClick)="add()" />
          <div class="flex items-center gap-2 flex-wrap">
            <p-iconfield iconPosition="left">
              <p-inputicon><i class="pi pi-search"></i></p-inputicon>
              <input pInputText type="text" placeholder="Buscar por código, descrição ou cTribMun…"
                [(ngModel)]="search" (input)="onSearch()" class="w-80" />
            </p-iconfield>
            @if (search) {
              <p-button icon="pi pi-times" severity="secondary" (onClick)="clearSearch()" />
            }
          </div>
        </div>
      </ng-template>

      <ng-template #emptymessage>
        <tr>
          <td colspan="7" class="text-center text-gray-400 py-6">
            Nenhum código de serviço cadastrado.
          </td>
        </tr>
      </ng-template>

      <ng-template #header>
        <tr>
          <th>cTribNac</th>
          <th>cTribMun</th>
          <th>cNBS</th>
          <th>Descrição</th>
          <th class="text-right">Alíq. ISS</th>
          <th>Retenções</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template #body let-item>
        <tr>
          <td class="font-mono">{{ item.cTribNac }}</td>
          <td class="font-mono">{{ item.cTribMun || '—' }}</td>
          <td class="font-mono">{{ item.cNBS || '—' }}</td>
          <td class="max-w-md truncate" [pTooltip]="item.descricao" tooltipPosition="top">
            {{ item.descricao }}
          </td>
          <td class="text-right">{{ item.aliqISSQN | number:'1.2-2' }}%</td>
          <td class="text-xs">{{ hasRetencao(item) }}</td>
          <td>
            <p-tag
              [value]="item.isActive ? 'Ativo' : 'Inativo'"
              [severity]="item.isActive ? 'success' : 'secondary'" />
          </td>
          <td>
            <div class="flex gap-1">
              <p-button icon="pi pi-pencil" (onClick)="edit(item._id)"
                severity="primary" [rounded]="true" [text]="true" pTooltip="Editar" />
              <p-button icon="pi pi-trash" (onClick)="confirmDelete(item)"
                severity="danger" [rounded]="true" [text]="true" pTooltip="Desativar"
                [disabled]="!item.isActive" />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<p-confirmDialog />
<p-toast />
