<app-sidebar />
<div class="p-4 sm:ml-64 pt-4">
  <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome" class="mb-4 block" />

  @if (loading) {
    <div class="text-center text-gray-400 py-10">Carregando...</div>
  }

  @if (!loading) {
  <p-card>
    <h2 class="text-xl font-semibold mb-4">{{ id ? 'Editar' : 'Novo' }} Código de Serviço</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm mb-1">
          cTribNac *
          <i class="pi pi-info-circle text-gray-400" pTooltip="Código de tributação nacional do ISSQN. 6 dígitos."></i>
        </label>
        <input pInputText class="w-full font-mono" maxlength="6"
          [(ngModel)]="model.cTribNac" placeholder="010101" />
      </div>

      <div>
        <label class="block text-sm mb-1">
          cTribMun
          <i class="pi pi-info-circle text-gray-400" pTooltip="Código de tributação municipal. Varia por prefeitura."></i>
        </label>
        <input pInputText class="w-full font-mono" [(ngModel)]="model.cTribMun" placeholder="0101" />
      </div>

      <div>
        <label class="block text-sm mb-1">
          cNBS
          <i class="pi pi-info-circle text-gray-400" pTooltip="Código NBS (Nomenclatura Brasileira de Serviços). 9 dígitos. Opcional."></i>
        </label>
        <input pInputText class="w-full font-mono" [(ngModel)]="model.cNBS" placeholder="123456789" />
      </div>

      <div class="md:col-span-3">
        <label class="block text-sm mb-1">Descrição *</label>
        <textarea pInputTextarea class="w-full" rows="2" maxlength="600"
          [(ngModel)]="model.descricao"
          placeholder="Descrição do serviço prestado"></textarea>
        <small class="text-gray-500">Será usado como base para o campo xDescServ na DPS.</small>
      </div>

      <div>
        <label class="block text-sm mb-1">Alíquota ISSQN (%) *</label>
        <p-inputNumber [(ngModel)]="model.aliqISSQN"
          [minFractionDigits]="2" [maxFractionDigits]="4"
          [min]="0" [max]="100" suffix=" %" styleClass="w-full" />
      </div>

      <div>
        <label class="block text-sm mb-1">Local de incidência</label>
        <p-select [options]="optionLocalIncidencia"
          [(ngModel)]="model.localIncidencia"
          optionLabel="label" optionValue="value" styleClass="w-full" />
      </div>

      <div class="flex items-end gap-2">
        <p-toggleSwitch [(ngModel)]="model.isActive" inputId="isActive" />
        <label for="isActive" class="text-sm">{{ model.isActive ? 'Ativo' : 'Inativo' }}</label>
      </div>
    </div>

    <p-divider align="left">
      <span class="text-sm font-medium">Retenções padrão</span>
    </p-divider>

    <div class="mb-3 flex items-center gap-2">
      <p-toggleSwitch [(ngModel)]="retencaoIss" inputId="retIss" />
      <label for="retIss" class="text-sm">ISSQN retido na fonte</label>
      <i class="pi pi-info-circle text-gray-400 ml-1"
        pTooltip="Quando marcado, o valor do ISSQN compõe as retenções (tpRetISSQN=2)."></i>
    </div>

    <p-table [value]="retencoes" [tableStyle]="{ 'min-width': '40rem' }">
      <ng-template #header>
        <tr>
          <th>Tributo</th>
          <th class="text-center">Reter na fonte</th>
          <th class="text-right">Alíquota (%)</th>
        </tr>
      </ng-template>
      <ng-template #body let-row>
        <tr>
          <td class="font-medium">{{ row.label }}</td>
          <td class="text-center">
            <p-toggleSwitch [(ngModel)]="row.retido" />
          </td>
          <td class="text-right" style="max-width: 12rem">
            <p-inputNumber [(ngModel)]="row.aliq"
              [minFractionDigits]="2" [maxFractionDigits]="4"
              [min]="0" [max]="100" suffix=" %"
              [disabled]="!row.retido"
              styleClass="w-full" />
          </td>
        </tr>
      </ng-template>
    </p-table>

    <div class="mt-6 flex justify-end gap-2">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="cancel()" />
      <p-button label="Salvar" icon="pi pi-save" [loading]="saving" (onClick)="save()" />
    </div>
  </p-card>
  }
</div>

<p-toast />
