<aside id="logo-sidebar"
  [class]="isDarkMode
  ? 'fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full bg-gray-950 border-r border-gray-800 sm:translate-x-0 flex flex-col'
  : 'fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full bg-white border-r border-gray-200 sm:translate-x-0 flex flex-col'"
  aria-label="Sidebar">

  <!-- Logo / Topo -->
  <div [class]="isDarkMode
    ? 'flex items-center gap-3 px-4 py-5 border-b border-gray-800'
    : 'flex items-center gap-3 px-4 py-5 border-b border-gray-100'">
    <img src="/assets/logo-navbar.png" class="h-8" alt="WTicket" />
  </div>

  <!-- Itens de navegação -->
  <div class="flex-1 overflow-y-auto px-3 py-4">
    <ul class="space-y-1 font-medium">
      @for (menuItem of menuItems; track $index) {
        <li>
          @if (menuItem.panelModel) {
            <p-panelMenu [model]="menuItem.panelModel"></p-panelMenu>
          } @else {
            <a
              [routerLink]="menuItem.link"
              routerLinkActive="active-nav-item"
              [class]="isDarkMode
                ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors'
                : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors'">
              <i [class]="menuItem.icon" style="font-size: 1.1rem; width: 1.25rem; text-align: center;"></i>
              <span class="text-sm">{{ menuItem.name }}</span>
            </a>
          }
        </li>
      }
    </ul>
  </div>

  <!-- Rodapé: perfil do usuário -->
  <div [class]="isDarkMode
    ? 'border-t border-gray-800 px-4 py-4'
    : 'border-t border-gray-100 px-4 py-4'">
    <div class="flex items-center gap-3 mb-3">
      <div [class]="isDarkMode
        ? 'w-8 h-8 rounded-full bg-green-600 flex items-center justify-center text-white text-sm font-semibold flex-shrink-0'
        : 'w-8 h-8 rounded-full bg-green-600 flex items-center justify-center text-white text-sm font-semibold flex-shrink-0'">
        {{ getAvatarLabel() }}
      </div>
      <span [class]="isDarkMode ? 'text-sm text-gray-200 truncate' : 'text-sm text-gray-700 truncate'">
        {{ user?.name || 'Usuário' }}
      </span>
    </div>
    <button
      (click)="logout()"
      [class]="isDarkMode
        ? 'w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-red-400 transition-colors text-sm'
        : 'w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-red-500 transition-colors text-sm'">
      <i class="pi pi-sign-out" style="font-size: 0.9rem;"></i>
      <span>Sair</span>
    </button>
  </div>
</aside>
