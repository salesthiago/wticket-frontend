<aside id="logo-sidebar"
  [class]="isDarkMode
  ? 'fixed top-0 left-0 z-40 w-64 h-screen pt-20 transition-transform -translate-x-full bg-gray-950 sm:translate-x-0 border-gray-800'
  : 'fixed top-0 left-0 z-40 w-64 h-screen pt-20 transition-transform -translate-x-full bg-gray-100 border-r border-gray-50 sm:translate-x-0'"
  aria-label="Sidebar">
   <div [class]="isDarkMode
   ? 'h-full px-3 pb-4 overflow-y-auto bg-gray-950'
   : 'h-full px-3 pb-4 overflow-y-auto bg-gray-100'">
      <ul class="space-y-2 font-medium">
        @for (item of items; track $index) {

          <li>
            <a [href]="item.link" [class]="isDarkMode
              ? 'flex items-center p-2 text-gray-200 rounded-lg hover:bg-gray-600 group'
              : 'flex items-center p-2 rounded-lg text-gray-950 hover:bg-gray-400 group'">
              <i [class]="item.icon" style="font-size: 1.5rem"></i>
              <span class="ms-3"> {{ item.name }}</span>
            </a>
          </li>
        }

      </ul>
   </div>
</aside>
