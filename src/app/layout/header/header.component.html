<nav [class]="dark
  ? 'fixed top-0 z-50 left-0 sm:left-64 right-0 bg-gray-950 border-b border-gray-900'
  : 'fixed top-0 z-50 left-0 sm:left-64 right-0 bg-white border-b border-gray-200'">
  <div class="px-4 py-3">
    <div class="flex items-center justify-between gap-3">
      <button
        type="button"
        (click)="openSidebar()"
        aria-label="Abrir menu"
        [class]="dark
          ? 'sm:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors'
          : 'sm:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors'">
        <i class="pi pi-bars text-xl"></i>
      </button>
      <div class="flex items-center gap-3 ml-auto">
        @if (dark) {
          <i class="pi pi-moon text-blue-400 text-lg"></i>
        } @else {
          <i class="pi pi-sun text-yellow-500 text-lg"></i>
        }
        <p-toggleswitch [(ngModel)]="dark" (onChange)="toggleTheme()" class="w-12"></p-toggleswitch>
      </div>
    </div>
  </div>
</nav>
<p-toast />
